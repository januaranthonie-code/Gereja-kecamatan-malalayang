<!DOCTYPE html>
<html>
<head>
    <title>Peta Gereja Malalayang</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <style>
        body { margin: 0; padding: 0; }
        #map { height: 100vh; width: 100%; }
        h2 { 
            position: absolute; 
            top: 10px; 
            width: 100%; 
            z-index: 1000; 
            text-align: center; 
            background: rgba(255,255,255,0.7);
            margin: 0;
            padding: 10px 0;
        }
    </style>
</head>
<body>

<h2>Peta Persebaran Gereja Malalayang</h2>
<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
    // Inisialisasi Peta
    var map = L.map('map').setView([1.456, 124.800], 14);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap'
    }).addTo(map);

    // Mengambil data dari data.json
    fetch('data.json')
        .then(res => {
            if (!res.ok) throw new Error("File JSON tidak ditemukan atau gagal dimuat");
            return res.json();
        })
        .then(data => {
            // Karena datanya GeoJSON, kita loop bagian 'features'
            data.features.forEach(g => {
                // GeoJSON menggunakan [longitude, latitude]
                var lng = g.geometry.coordinates[0];
                var lat = g.geometry.coordinates[1];
                var nama = g.properties.nama_gereja;

                // Leaflet menggunakan [latitude, longitude]
                L.marker([lat, lng]).addTo(map)
                    .bindPopup("<b>" + nama + "</b>");
            });
        })
        .catch(err => {
            console.error("Ada masalah saat memuat peta:", err);
        });
</script>
</body>
</html>
