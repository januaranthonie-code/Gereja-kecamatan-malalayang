<!DOCTYPE html>
<html>
<head>
<title>Peta Gereja Malalayang</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<style>#map{height:100vh;}</style>
</head>
<body>
<h2 style="text-align:center;">Peta Persebaran Gereja Malalayang</h2>
<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
var map = L.map('map').setView([1.456,124.800],14);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
 attribution:'© OpenStreetMap'
}).addTo(map);

fetch('data.json')
.then(res=>res.json())
.then(data=>{
 data.forEach(g=>{
   L.marker([g.lat,g.lng]).addTo(map)
   .bindPopup("<b>"+g.nama+"</b><br>"+g.alamat);
 });
});
</script>
</body>
</html>
